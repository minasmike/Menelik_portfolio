name: Deploy to cPanel
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.22 # Matches your project exactly

      - name: Install & Build
        run: |
          bun install
          bun run build

      - name: Sync to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.menelikmichael.com
          username: menelik@menelikmichael.com
          password: minas2596
          local-dir: ./dist/
          # If FileZilla shows '/' as the web root, use './' here. 
          # If it shows folders like 'public_html', use './public_html/'
          server-dir: ./ 
          protocol: ftps # Forces the TLS connection FileZilla used
          port: 21
          # This ignores the 'Self-Signed' certificate warning common on shared hosts
          security: loose