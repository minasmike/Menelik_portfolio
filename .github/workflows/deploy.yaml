name: Deploy to cPanel
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.22 # Matches your project exactly

      - name: Install & Build
        run: |
          bun install
          bun run build

      - name: Sync to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ # Vite outputs to 'dist', not 'out'
          server-dir: ./public_html/ # Explicitly point to your web root
          # These two lines usually fix the "Timeout" error on cPanel:
          protocol: ftp
          port: 21